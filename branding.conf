# ============================================================================
# iSIEM Branding Configuration
# Only branding CHOICES go here — everything else is auto-discovered.
# ============================================================================

# ======================== Brand Identity ========================
BRAND_NAME="iSIEM"
BRAND_SUBTITLE="SECURITY PLATFORM"
BRAND_DASHBOARDS_LABEL="Dashboards"

# ======================== Colors (hex) ========================
COLOR_DARK="#2C3E50"                       # Strokes/text on light backgrounds
COLOR_DARK_SECONDARY="#7F8C8D"             # Subtitle on light backgrounds
COLOR_LIGHT="#ffffff"                       # Strokes/text on dark backgrounds
COLOR_LIGHT_SECONDARY="rgba(255,255,255,0.7)"  # Subtitle on dark backgrounds
COLOR_ACCENT="#00d4aa"                     # Accent (spinner, status dot)

# ======================== Font ========================
FONT_FAMILY="Segoe UI, Helvetica Neue, Arial, sans-serif"

# ======================== Index / Cron Prefix ========================
# Used to rename wazuh-alerts-* → isiem-alerts-*, etc.
PREFIX="isiem"

# ======================== Reports ========================
REPORT_HEADER="iSIEM, connect: infosec.team@iserveu.in"
REPORT_FOOTER="iSIEM, By iServeU, infosec.team@iserveu.in"
REPORT_EMAIL="infosec.team@iserveu.in"
REPORT_URL="https://iserveu.in"
REPORT_COPYRIGHT="Copyright © iServeU Technology Pvt. Ltd."

# ======================== Enrollment ========================
ENROLLMENT_DNS="isiem.isu"

# ======================== Target Namespace ========================
# Set the Wazuh deployment namespace explicitly, or leave empty for auto-discovery
# Can also be passed as the second CLI argument: bash apply-login-branding.sh branding.conf <namespace>
NAMESPACE="isiem"

# ======================== Browser Tab / Favicon ========================
# Text shown in the browser tab (opensearchDashboards.defaultAppTitle)
BRAND_TAB_TITLE="iSIEM"
# Favicon file name — place this file in the logos/ directory
# Supported: .svg  |  Recommended size: 32x32 or 48x48
BRAND_FAVICON_FILE="isiem-logo-sidebar.svg"
